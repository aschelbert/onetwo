<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <title>Book a Demo — ONE two</title>
    <script>
      (function() {
        var h = window.location.hostname;
        if (h === 'localhost' || h === '127.0.0.1') return;
        var parts = h.split('.');
        if (parts.length >= 3 && parts[0] !== 'www') {
          window.location.replace('/login');
        }
      })();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700;9..144,900&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0f1a2e;
            --paper: #faf9f7;
            --accent: #d62839;
            --accent-light: #fde8ea;
            --muted: #64748b;
            --border: #e2e0dc;
            --card: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--paper);
            color: var(--ink);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .display { font-family: 'Fraunces', serif; }

        /* NAV */
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            background: rgba(250,249,247,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .nav-inner {
            max-width: 1200px; margin: 0 auto;
            padding: 1rem 2rem;
            display: flex; align-items: center; justify-content: space-between;
        }
        .logo {
            font-family: 'Fraunces', serif;
            font-weight: 900; font-size: 1.5rem;
            color: var(--ink);
            text-decoration: none;
        }
        .logo span { color: var(--accent); }
        .nav-links { display: flex; gap: 2rem; align-items: center; }
        .nav-links a {
            text-decoration: none; color: var(--muted);
            font-size: 0.9rem; font-weight: 500;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: var(--ink); }
        .btn {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.7rem 1.5rem;
            border-radius: 8px;
            font-weight: 600; font-size: 0.9rem;
            text-decoration: none;
            transition: all 0.25s;
            cursor: pointer; border: none;
        }
        .btn-primary {
            background: var(--accent); color: #fff;
            box-shadow: 0 2px 8px rgba(214,40,57,0.25);
        }
        .btn-primary:hover {
            background: #b91c2c;
            box-shadow: 0 4px 16px rgba(214,40,57,0.35);
            transform: translateY(-1px);
        }

        /* DEMO PAGE */
        .demo-page {
            padding: 8rem 2rem 4rem;
            max-width: 900px;
            margin: 0 auto;
        }
        .demo-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .demo-header h1 {
            font-family: 'Fraunces', serif;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
        }
        .demo-header p {
            color: var(--muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }
        .calendar-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(15,26,46,0.06);
        }
        .calendar-card iframe {
            width: 100%;
            height: 700px;
            border: none;
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--muted);
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
            margin-top: 4rem;
        }
        footer strong { color: var(--ink); }
        .footer-links {
            margin-top: 0.5rem;
            display: flex; gap: 1.5rem; justify-content: center;
        }
        .footer-links a {
            color: var(--muted); text-decoration: none;
            font-size: 0.85rem;
        }
        .footer-links a:hover { color: var(--ink); }

        @media (max-width: 768px) {
            .demo-header h1 { font-size: 1.8rem; }
            .demo-page { padding: 7rem 1rem 3rem; }
            .calendar-card iframe { height: 550px; }
            .nav-links a:not(.btn) { display: none; }
        }
    </style>
</head>
<body>

<!-- NAV -->
<nav>
    <div class="nav-inner">
        <a href="/" class="logo">ONE <span>two</span></a>
        <div class="nav-links">
            <a href="/#features">Features</a>
            <a href="/#pricing">Pricing</a>
            <a href="/login?create=1" class="btn btn-primary">Join the Waitlist</a>
        </div>
    </div>
</nav>

<!-- DEMO CONTENT -->
<main class="demo-page">
    <div class="demo-header">
        <h1 class="display">Book a Demo</h1>
        <p>See how ONE two simplifies HOA governance, compliance, and accounting. Pick a time that works for you.</p>
    </div>
    <div class="calendar-card">
        <!-- Cal inline embed code begins -->
        <div style="width:100%;height:100%;overflow:scroll" id="my-cal-inline-30min"></div>
        <script type="text/javascript">
          (function (C, A, L) { let p = function (a, ar) { a.q.push(ar); }; let d = C.document; C.Cal = C.Cal || function () { let cal = C.Cal; let ar = arguments; if (!cal.loaded) { cal.ns = {}; cal.q = cal.q || []; d.head.appendChild(d.createElement("script")).src = A; cal.loaded = true; } if (ar[0] === L) { const api = function () { p(api, arguments); }; const namespace = ar[1]; api.q = api.q || []; if(typeof namespace === "string"){cal.ns[namespace] = cal.ns[namespace] || api;p(cal.ns[namespace], ar);p(cal, ["initNamespace", namespace]);} else p(cal, ar); return;} p(cal, ar); }; })(window, "https://app.cal.com/embed/embed.js", "init");
          Cal("init", "30min", {origin:"https://app.cal.com"});

          Cal.ns["30min"]("inline", {
            elementOrSelector:"#my-cal-inline-30min",
            config: {"layout":"month_view","useSlotsViewOnSmallScreen":"true"},

          Cal.ns["30min"]("ui", {"hideEventTypeDetails":false,"layout":"month_view"});
        </script>
        <!-- Cal inline embed code ends -->
    </div>
</main>

<!-- FOOTER -->
<footer>
    <p>&copy; 2026 <strong>ONE two</strong>, Inc. All rights reserved.</p>
    <div class="footer-links">
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
        <a href="#">Contact</a>
    </div>
</footer>

</body>
</html>
